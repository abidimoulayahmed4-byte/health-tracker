<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>برنامج متابعة الصحة</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
  <style>
    body { 
      font-family: sans-serif; 
      padding: 2rem; 
      background: #f5f5f5; 
      direction: rtl; 
    }
    h1 { color: #38761d; text-align: center; }
    .day-card { 
      background: #fff; 
      padding: 20px; 
      margin: 20px auto; 
      max-width: 500px; 
      border-radius: 10px; 
      box-shadow: 0 2px 5px rgba(0,0,0,0.1); 
    }
    button { 
      margin: 5px; 
      padding: 8px 12px; 
      background: #38761d; 
      color: #fff; 
      border: none; 
      border-radius: 5px; 
      cursor: pointer; 
    }
    button:disabled {
      background: #ccc; 
      cursor: not-allowed;
    }
    ul { padding-right: 20px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.js"></script>
</body>
</html>
